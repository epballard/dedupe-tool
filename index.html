<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Deduplicator - Deduplicate Across Runs</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .tabs-container {
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 2px solid #dee2e6;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .tab {
            padding: 12px 20px;
            border: none;
            background: #f8f9fa;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-weight: 600;
            color: #495057;
            transition: all 0.2s;
            white-space: nowrap;
            position: relative;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab.master {
            background: #28a745;
            color: white;
        }

        .tab.master:hover {
            background: #218838;
        }

        .tab .close-btn {
            margin-left: 8px;
            color: #dc3545;
            font-weight: bold;
            font-size: 18px;
        }

        .tab.active .close-btn {
            color: white;
        }

        .tab-title {
            cursor: text;
        }

        .tab-title:hover {
            text-decoration: underline;
        }

        .tab-title-input {
            background: white;
            border: 2px solid #667eea;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            width: 120px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .panel {
            margin-bottom: 20px;
        }

        .panel-header {
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 8px 8px 0 0;
            border: 1px solid #dee2e6;
            border-bottom: none;
            font-weight: 600;
            color: #495057;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 16px;
            border: 1px solid #dee2e6;
            border-radius: 0 0 8px 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .master-output {
            background-color: #f8f9fa;
        }

        .data-table-container {
            width: 100%;
            max-height: 500px;
            overflow: auto;
            border: 1px solid #dee2e6;
            border-radius: 0 0 8px 8px;
            background: white;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
        }

        .data-table thead {
            position: sticky;
            top: 0;
            background: #f8f9fa;
            z-index: 10;
        }

        .data-table th {
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #dee2e6;
            font-weight: 600;
            color: #495057;
        }

        .data-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .data-table tbody tr:hover {
            background-color: #f8f9fa;
        }

        .data-table .new-row {
            background-color: #fff3cd;
            font-weight: bold;
        }

        .data-table .new-row td:first-child::before {
            content: "🟡 ";
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: #999;
            font-style: italic;
        }

        .highlight-new {
            background-color: #fff3cd;
            font-weight: bold;
        }

        .line-with-highlight {
            background: linear-gradient(90deg, #fff3cd 0%, transparent 100%);
            padding: 2px 4px;
            margin: -2px -4px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .option label {
            cursor: pointer;
            user-select: none;
            color: #495057;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .stats {
            text-align: center;
            padding: 16px;
            background: #e7f3ff;
            border-radius: 8px;
            font-size: 18px;
            color: #004085;
            font-weight: 600;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stats.success {
            background: #d4edda;
            color: #155724;
        }

        .add-run-btn {
            background: #17a2b8;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .add-run-btn:hover {
            background: #138496;
        }

        .file-upload-section {
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #dee2e6;
        }

        .file-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .file-input-label {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-block;
            font-weight: 600;
        }

        .file-input-label:hover {
            background: #5568d3;
        }

        input[type="file"] {
            display: none;
        }

        .column-selector {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 6px;
            display: none;
        }

        .column-selector.active {
            display: block;
        }

        .column-selector label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .column-selector select {
            width: 100%;
            padding: 8px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            font-size: 14px;
            min-height: 120px;
        }

        .import-btn {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .import-btn:hover {
            background: #218838;
        }

        .export-history {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .export-history h3 {
            margin-bottom: 15px;
            color: #495057;
            font-size: 18px;
        }

        .export-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .export-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-radius: 6px;
            border: 1px solid #dee2e6;
        }

        .export-item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .export-item-name {
            font-weight: 600;
            color: #333;
        }

        .export-item-details {
            font-size: 12px;
            color: #666;
        }

        .export-item-download {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .export-item-download:hover {
            background: #5568d3;
        }

        .no-exports {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .export-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding: 15px;
            background: white;
            border-radius: 6px;
            border: 1px solid #dee2e6;
        }

        .stat-box {
            flex: 1;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .options {
                flex-direction: column;
                gap: 12px;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        .icon {
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <h1>📊 Audit Deduplicator</h1>
                <p class="subtitle">Track audit runs and identify duplicates across multiple runs</p>
            </div>
            <button class="btn-primary" onclick="updateMasterList()" style="background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); box-shadow: 0 4px 12px rgba(155, 89, 182, 0.4);">
                <span class="icon">🔄</span>
                Update Master List
            </button>
        </div>

        <div class="tabs-container">
            <div class="tabs" id="tabs">
                <!-- Tabs will be added dynamically -->
            </div>
        </div>

        <div id="tab-contents">
            <!-- Tab contents will be added dynamically -->
        </div>

        <div class="controls">
            <div class="options">
                <div class="option">
                    <input type="checkbox" id="ignoreCase">
                    <label for="ignoreCase">Ignore case</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="removeEmpty" checked>
                    <label for="removeEmpty">Remove empty lines</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="trim" checked>
                    <label for="trim">Trim whitespace</label>
                </div>
            </div>

            <div class="buttons">
                <button class="btn-success" onclick="exportToExcel()">
                    <span class="icon">📊</span>
                    Export to Excel
                </button>
                <button class="btn-success" onclick="copyCurrentTab()">
                    <span class="icon">📋</span>
                    Copy Current Tab
                </button>
                <button class="btn-secondary" onclick="clearCurrentTab()">
                    <span class="icon">🗑️</span>
                    Clear Current Tab
                </button>
                <button class="btn-secondary" onclick="clearAllTabs()" style="background: #dc3545;">
                    <span class="icon">🗑️</span>
                    Clear All Tabs
                </button>
            </div>

            <div id="stats" class="stats">
                Click "+ Add Run" to start your first audit run
            </div>

            <div class="export-history">
                <h3>📥 Export History</h3>
                <div id="export-stats" class="export-stats" style="display: none;">
                    <!-- Stats will be populated dynamically -->
                </div>
                <div id="export-list" class="export-list">
                    <div class="no-exports">No exports yet. Export new items to see them here.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let runs = [];
        let activeTab = null;
        let runCounter = 0;
        let excelData = {}; // Store parsed Excel data per run
        let runDataWithIds = {}; // Store display data with corresponding FTID values per run
        let columnHeaders = {}; // Store column headers per run
        let exportHistory = []; // Store export history with data

        function init() {
            // Load export history from localStorage
            loadExportHistory();

            // Create Master List tab
            createMasterTab();
            // Add two runs by default
            addRun();
            addRun();
        }

        function saveExportHistory() {
            try {
                localStorage.setItem('auditDeduplicatorExports', JSON.stringify(exportHistory));
            } catch (e) {
                console.error('Failed to save export history:', e);
            }
        }

        function loadExportHistory() {
            try {
                const saved = localStorage.getItem('auditDeduplicatorExports');
                if (saved) {
                    exportHistory = JSON.parse(saved);
                    updateExportHistoryUI();
                }
            } catch (e) {
                console.error('Failed to load export history:', e);
                exportHistory = [];
            }
        }

        function createMasterTab() {
            const tabsDiv = document.getElementById('tabs');
            const contentsDiv = document.getElementById('tab-contents');

            // Create master tab button
            const masterTab = document.createElement('button');
            masterTab.className = 'tab master';
            masterTab.textContent = '📋 Master List';
            masterTab.onclick = () => switchTab('master');
            tabsDiv.appendChild(masterTab);

            // Create master tab content
            const masterContent = document.createElement('div');
            masterContent.id = 'tab-master';
            masterContent.className = 'tab-content';
            masterContent.innerHTML = `
                <div class="panel">
                    <div class="panel-header">
                        📋 Master List (Deduped by FTID)
                        <span style="font-size: 12px; color: #666; font-weight: normal;">
                            🟡 = New items from latest run
                        </span>
                    </div>
                    <div id="master-table-container" class="data-table-container">
                        <div class="empty-state">Master list will appear here after you update...</div>
                    </div>
                </div>
            `;
            contentsDiv.appendChild(masterContent);
        }

        function addRun() {
            runCounter++;
            const runId = `run-${runCounter}`;
            const runName = `Run ${runCounter}`;

            runs.push({ id: runId, name: runName, data: [] });

            const tabsDiv = document.getElementById('tabs');
            const contentsDiv = document.getElementById('tab-contents');

            // Create tab button
            const tab = document.createElement('button');
            tab.className = 'tab';
            tab.id = `tab-btn-${runId}`;
            tab.innerHTML = `<span class="tab-title" id="title-${runId}" ondblclick="editTabName('${runId}')">${runName}</span> <span class="close-btn" onclick="event.stopPropagation(); removeRun('${runId}')"">×</span>`;
            tab.onclick = () => switchTab(runId);

            // Insert before master tab
            const masterTab = tabsDiv.querySelector('.tab.master');
            tabsDiv.insertBefore(tab, masterTab);

            // Create tab content
            const content = document.createElement('div');
            content.id = `tab-${runId}`;
            content.className = 'tab-content';
            content.innerHTML = `
                <div class="file-upload-section">
                    <div class="file-input-wrapper">
                        <label class="file-input-label" for="file-${runId}">
                            📁 Import from Excel
                        </label>
                        <input type="file" id="file-${runId}" accept=".xlsx,.xls,.csv"
                               onchange="handleFileUpload('${runId}', event)">
                        <span id="filename-${runId}" style="color: #666; font-size: 14px;"></span>
                    </div>
                    <div id="column-selector-${runId}" class="column-selector">
                        <label>Select FTID column for duplicate detection:</label>
                        <select id="id-column-select-${runId}" onchange="importAllColumns('${runId}')">
                            <option value="">-- Select FTID column --</option>
                        </select>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        📝 ${runName} - Import your audit data
                        <button class="add-run-btn" onclick="addRun()">+ Add Run</button>
                    </div>
                    <div id="table-container-${runId}" class="data-table-container">
                        <div class="empty-state">Import Excel file above to view data</div>
                    </div>
                </div>
            `;
            contentsDiv.appendChild(content);

            // Switch to new tab
            switchTab(runId);
        }

        function removeRun(runId) {
            if (!confirm('Remove this run?')) return;

            runs = runs.filter(r => r.id !== runId);
            document.getElementById(`tab-btn-${runId}`).remove();
            document.getElementById(`tab-${runId}`).remove();

            // Switch to master or another tab
            if (runs.length > 0) {
                switchTab(runs[0].id);
            } else {
                switchTab('master');
            }

            updateMasterList();
        }

        function switchTab(tabId) {
            activeTab = tabId;

            // Update tab buttons
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            const activeTabBtn = tabId === 'master'
                ? document.querySelector('.tab.master')
                : document.getElementById(`tab-btn-${tabId}`);
            if (activeTabBtn) activeTabBtn.classList.add('active');

            // Update tab contents
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`tab-${tabId}`).classList.add('active');

            showStats(`Viewing ${tabId === 'master' ? 'Master List' : runs.find(r => r.id === tabId)?.name}`, false);
        }

        function updateMasterList() {
            const ignoreCase = document.getElementById('ignoreCase').checked;

            // Collect all data from runs
            let allItemsWithIds = [];
            let latestRunFtids = new Set();
            let previousRunFtids = new Set();

            runs.forEach((run, index) => {
                const runData = runDataWithIds[run.id];

                if (!runData || runData.length === 0) {
                    return;
                }

                // Process structured data with FTIDs
                runData.forEach(item => {
                    allItemsWithIds.push({
                        ...item,
                        runIndex: index
                    });

                    const ftidKey = ignoreCase ? item.ftid.toLowerCase() : item.ftid;

                    if (index === runs.length - 1) {
                        latestRunFtids.add(ftidKey);
                    } else {
                        previousRunFtids.add(ftidKey);
                    }
                });
            });

            if (allItemsWithIds.length === 0) {
                showStats('⚠️ No data in any runs!', false);
                return;
            }

            // Deduplicate based on FTID
            const seenFtids = new Set();
            const uniqueRows = [];
            const newRows = [];

            allItemsWithIds.forEach(item => {
                const ftidKey = ignoreCase ? item.ftid.toLowerCase() : item.ftid;

                if (!seenFtids.has(ftidKey)) {
                    seenFtids.add(ftidKey);

                    const isNew = latestRunFtids.has(ftidKey) && !previousRunFtids.has(ftidKey);

                    uniqueRows.push({
                        cells: item.cells,
                        isNew: isNew
                    });

                    if (isNew) {
                        newRows.push(item.cells);
                    }
                }
            });

            // Get headers from first run that has data
            let masterHeaders = [];
            for (const run of runs) {
                if (columnHeaders[run.id]) {
                    masterHeaders = columnHeaders[run.id];
                    break;
                }
            }

            // Store data for export (with proper cell arrays)
            masterListData = {
                rows: uniqueRows.map(r => r.cells),
                headers: masterHeaders,
                newRows: newRows
            };

            // Display as table
            renderMasterTable(masterHeaders, uniqueRows);

            const totalDupes = allItemsWithIds.length - uniqueRows.length;
            showStats(
                `✅ Master List Updated! ${uniqueRows.length} unique FTIDs | ${newRows.length} new from latest run | ${totalDupes} duplicates removed`,
                true
            );

            switchTab('master');
        }

        function renderMasterTable(headers, rows) {
            const container = document.getElementById('master-table-container');

            if (rows.length === 0) {
                container.innerHTML = '<div class="empty-state">No data to display</div>';
                return;
            }

            let tableHTML = '<table class="data-table"><thead><tr>';

            headers.forEach(header => {
                tableHTML += `<th>${header}</th>`;
            });

            tableHTML += '</tr></thead><tbody>';

            rows.forEach(row => {
                const rowClass = row.isNew ? ' class="new-row"' : '';
                tableHTML += `<tr${rowClass}>`;
                row.cells.forEach(cell => {
                    tableHTML += `<td>${cell}</td>`;
                });
                tableHTML += '</tr>';
            });

            tableHTML += '</tbody></table>';
            container.innerHTML = tableHTML;
        }

        function copyCurrentTab() {
            const containerId = activeTab === 'master'
                ? 'master-table-container'
                : `table-container-${activeTab}`;

            const container = document.getElementById(containerId);
            if (!container) {
                showStats('⚠️ Nothing to copy!', false);
                return;
            }

            const table = container.querySelector('table');
            if (!table) {
                showStats('⚠️ No data to copy!', false);
                return;
            }

            // Convert table to TSV (tab-separated) for Excel paste
            let tsvData = '';
            const rows = table.querySelectorAll('tr');

            rows.forEach(row => {
                const cells = row.querySelectorAll('th, td');
                const rowData = Array.from(cells).map(cell => {
                    // Remove the emoji indicator
                    let text = cell.textContent.trim();
                    text = text.replace(/^🟡\s*/, '');
                    return text;
                });
                tsvData += rowData.join('\t') + '\n';
            });

            if (navigator.clipboard) {
                navigator.clipboard.writeText(tsvData);
                showStats('📋 Copied table to clipboard! (Paste into Excel)', true);
            } else {
                showStats('⚠️ Clipboard not supported', false);
            }
        }

        function clearCurrentTab() {
            if (activeTab === 'master') {
                showStats('⚠️ Cannot clear master list. Clear individual runs instead.', false);
                return;
            }

            const container = document.getElementById(`table-container-${activeTab}`);
            if (container) {
                container.innerHTML = '<div class="empty-state">Import Excel file to view data</div>';
                delete runDataWithIds[activeTab];
                delete columnHeaders[activeTab];
                showStats('Cleared!', true);
            }
        }

        function clearAllTabs() {
            if (!confirm('⚠️ Clear ALL tabs and start fresh? This cannot be undone.')) {
                return;
            }

            // Remove all run tabs (keep master)
            runs.forEach(run => {
                const tabBtn = document.getElementById(`tab-btn-${run.id}`);
                const tabContent = document.getElementById(`tab-${run.id}`);
                if (tabBtn) tabBtn.remove();
                if (tabContent) tabContent.remove();
            });

            // Clear all data
            runs = [];
            runDataWithIds = {};
            columnHeaders = {};
            excelData = {};
            masterListData = { rows: [], headers: [], newRows: [] };
            exportHistory = [];

            // Clear master list
            const masterContainer = document.getElementById('master-table-container');
            if (masterContainer) {
                masterContainer.innerHTML = '<div class="empty-state">Master list will appear here after you update...</div>';
            }

            // Clear export history UI
            saveExportHistory();
            updateExportHistoryUI();

            // Reset counter and add first run
            runCounter = 0;
            addRun();

            showStats('✅ All tabs cleared! Starting fresh.', true);
        }

        function handleFileUpload(runId, event) {
            const file = event.target.files[0];
            if (!file) return;

            const filenameSpan = document.getElementById(`filename-${runId}`);
            filenameSpan.textContent = `Loading ${file.name}...`;

            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });

                    // Get first sheet
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                    if (jsonData.length === 0) {
                        showStats('⚠️ Excel file is empty!', false);
                        return;
                    }

                    // Store the data
                    excelData[runId] = jsonData;

                    // Get column headers (first row)
                    const headers = jsonData[0];
                    const idColumnSelect = document.getElementById(`id-column-select-${runId}`);

                    idColumnSelect.innerHTML = '<option value="">-- Select FTID column --</option>';

                    let foundFtid = false;
                    headers.forEach((header, index) => {
                        // Add to ID column selector
                        const idOption = document.createElement('option');
                        idOption.value = index;
                        idOption.textContent = `${header} (Column ${String.fromCharCode(65 + index)})`;
                        idColumnSelect.appendChild(idOption);

                        // Auto-select FTID if found
                        if (header && header.toString().toUpperCase().includes('FTID')) {
                            idOption.selected = true;
                            foundFtid = true;
                        }
                    });

                    // Show column selector
                    document.getElementById(`column-selector-${runId}`).classList.add('active');
                    filenameSpan.textContent = `✓ ${file.name} loaded`;

                    if (foundFtid) {
                        // Auto-import if FTID was found
                        showStats(`Excel file loaded! Auto-importing with FTID column...`, true);
                        importAllColumns(runId);
                    } else {
                        showStats(`Excel file loaded! Select the FTID column below.`, true);
                    }

                } catch (error) {
                    showStats(`⚠️ Error reading Excel file: ${error.message}`, false);
                    filenameSpan.textContent = '';
                }
            };

            reader.readAsArrayBuffer(file);
        }

        function importAllColumns(runId) {
            const idColumnSelect = document.getElementById(`id-column-select-${runId}`);
            const idColIndex = parseInt(idColumnSelect.value);

            if (isNaN(idColIndex)) {
                showStats('⚠️ Please select the FTID column!', false);
                return;
            }

            const data = excelData[runId];
            if (!data) return;

            // Get ALL column headers
            const headers = data[0];
            columnHeaders[runId] = headers;

            // Build data structure: each row has all cells and FTID
            const rowsData = [];

            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                const ftid = row[idColIndex];

                if (ftid === undefined || ftid === null || ftid === '') continue;

                // Collect ALL columns
                const cells = headers.map((_, colIdx) => row[colIdx] || '');

                rowsData.push({
                    ftid: String(ftid).trim(),
                    cells: cells
                });
            }

            // Store the data with IDs
            runDataWithIds[runId] = rowsData;

            // Display as table
            renderTable(runId, headers, rowsData);

            showStats(`✅ Imported ${rowsData.length} rows with all columns (deduping by FTID)`, true);
        }

        function renderTable(runId, headers, rows) {
            const container = document.getElementById(`table-container-${runId}`);

            if (rows.length === 0) {
                container.innerHTML = '<div class="empty-state">No data to display</div>';
                return;
            }

            let tableHTML = '<table class="data-table"><thead><tr>';

            headers.forEach(header => {
                tableHTML += `<th>${header}</th>`;
            });

            tableHTML += '</tr></thead><tbody>';

            rows.forEach(row => {
                tableHTML += '<tr>';
                row.cells.forEach(cell => {
                    tableHTML += `<td>${cell}</td>`;
                });
                tableHTML += '</tr>';
            });

            tableHTML += '</tbody></table>';
            container.innerHTML = tableHTML;
        }

        function editTabName(runId) {
            const titleSpan = document.getElementById(`title-${runId}`);
            const currentName = titleSpan.textContent;

            // Create input
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentName;
            input.className = 'tab-title-input';

            // Replace span with input
            titleSpan.replaceWith(input);
            input.focus();
            input.select();

            // Save on blur or enter
            const saveTitle = () => {
                const newName = input.value.trim() || currentName;

                // Update run name
                const run = runs.find(r => r.id === runId);
                if (run) run.name = newName;

                // Create new span
                const newSpan = document.createElement('span');
                newSpan.className = 'tab-title';
                newSpan.id = `title-${runId}`;
                newSpan.textContent = newName;
                newSpan.ondblclick = () => editTabName(runId);

                input.replaceWith(newSpan);

                // Update panel header
                updatePanelHeader(runId, newName);
            };

            input.onblur = saveTitle;
            input.onkeydown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    saveTitle();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    const newSpan = document.createElement('span');
                    newSpan.className = 'tab-title';
                    newSpan.id = `title-${runId}`;
                    newSpan.textContent = currentName;
                    newSpan.ondblclick = () => editTabName(runId);
                    input.replaceWith(newSpan);
                }
            };
        }

        function updatePanelHeader(runId, newName) {
            const panelHeader = document.querySelector(`#tab-${runId} .panel-header`);
            if (panelHeader) {
                const addButton = panelHeader.querySelector('.add-run-btn');
                panelHeader.innerHTML = `📝 ${newName} - Paste or import your audit data`;
                if (addButton) {
                    panelHeader.appendChild(addButton);
                } else {
                    panelHeader.innerHTML += '<button class="add-run-btn" onclick="addRun()">+ Add Run</button>';
                }
            }
        }

        // Store master list data for export
        let masterListData = { rows: [], headers: [], newRows: [] };

        function exportToExcel() {
            if (masterListData.newRows.length === 0) {
                showStats('⚠️ No new items to export! Update Master List first.', false);
                return;
            }

            // Generate timestamp and filename
            const now = new Date();
            const timestamp = now.toISOString().slice(0, 10);
            const timeString = now.toLocaleTimeString();
            const filename = `audit-new-items-${timestamp}.xlsx`;

            // Get FTID column index from headers
            const ftidColumnIndex = masterListData.headers.findIndex(h =>
                h && h.toString().toUpperCase().includes('FTID')
            );

            // Extract FTIDs from the data
            const ftids = masterListData.newRows.map(row =>
                ftidColumnIndex >= 0 ? row[ftidColumnIndex] : null
            ).filter(ftid => ftid !== null && ftid !== undefined && ftid !== '');

            // Store in export history
            const exportRecord = {
                id: Date.now(),
                filename: filename,
                timestamp: `${timestamp} ${timeString}`,
                itemCount: masterListData.newRows.length,
                headers: masterListData.headers,
                data: masterListData.newRows,
                ftids: ftids
            };

            exportHistory.push(exportRecord);
            saveExportHistory();
            updateExportHistoryUI();

            // Create and download the file
            downloadExportFile(exportRecord);

            showStats(`✅ Exported ${masterListData.newRows.length} new items to ${filename}!`, true);
        }

        function downloadExportFile(exportRecord) {
            // Create workbook
            const wb = XLSX.utils.book_new();

            // Prepare data - headers + rows
            const excelData = [
                exportRecord.headers // Header row
            ];

            exportRecord.data.forEach(rowCells => {
                excelData.push(rowCells);
            });

            // Create worksheet
            const ws = XLSX.utils.aoa_to_sheet(excelData);

            // Set column widths based on number of columns
            const numColumns = exportRecord.headers.length;
            ws['!cols'] = Array(numColumns).fill({ wch: 20 });

            // Apply yellow highlighting to all data rows (except header)
            const range = XLSX.utils.decode_range(ws['!ref']);
            for (let row = 1; row <= range.e.r; row++) {
                for (let col = 0; col < numColumns; col++) {
                    const cellAddress = XLSX.utils.encode_cell({ r: row, c: col });

                    if (ws[cellAddress]) {
                        ws[cellAddress].s = {
                            fill: {
                                fgColor: { rgb: "FFFF00" }
                            },
                            font: {
                                bold: true
                            }
                        };
                    }
                }
            }

            // Add worksheet to workbook
            XLSX.utils.book_append_sheet(wb, ws, "New Items");

            // Download
            XLSX.writeFile(wb, exportRecord.filename);
        }

        function updateExportHistoryUI() {
            const exportList = document.getElementById('export-list');
            const exportStats = document.getElementById('export-stats');

            if (exportHistory.length === 0) {
                exportList.innerHTML = '<div class="no-exports">No exports yet. Export new items to see them here.</div>';
                exportStats.style.display = 'none';
                return;
            }

            // Calculate statistics
            const totalExports = exportHistory.length;
            const totalItems = exportHistory.reduce((sum, exp) => sum + exp.itemCount, 0);

            // Get all unique FTIDs across all exports
            const allFtids = new Set();
            exportHistory.forEach(exp => {
                if (exp.ftids) {
                    exp.ftids.forEach(ftid => allFtids.add(String(ftid).toLowerCase()));
                }
            });
            const uniqueFtids = allFtids.size;

            // Show statistics
            exportStats.style.display = 'flex';
            exportStats.innerHTML = `
                <div class="stat-box">
                    <div class="stat-number">${totalExports}</div>
                    <div class="stat-label">Total Exports</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">${totalItems}</div>
                    <div class="stat-label">Total Items Exported</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">${uniqueFtids}</div>
                    <div class="stat-label">Unique FTIDs</div>
                </div>
            `;

            // Show most recent first
            const sortedHistory = [...exportHistory].reverse();

            exportList.innerHTML = sortedHistory.map(exp => `
                <div class="export-item">
                    <div class="export-item-info">
                        <div class="export-item-name">${exp.filename}</div>
                        <div class="export-item-details">${exp.timestamp} • ${exp.itemCount} new items</div>
                    </div>
                    <button class="export-item-download" onclick="redownloadExport(${exp.id})">
                        📥 Download Again
                    </button>
                </div>
            `).join('');
        }

        function redownloadExport(exportId) {
            const exportRecord = exportHistory.find(exp => exp.id === exportId);
            if (exportRecord) {
                downloadExportFile(exportRecord);
                showStats(`📥 Re-downloaded ${exportRecord.filename}!`, true);
            }
        }

        function showStats(message, success) {
            const stats = document.getElementById('stats');
            stats.textContent = message;
            stats.className = success ? 'stats success' : 'stats';
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                updateMasterList();
            }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                copyCurrentTab();
            }
        });

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
