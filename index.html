<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deduplicate - Remove Duplicates from Lists</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1200px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 8px 8px 0 0;
            border: 1px solid #dee2e6;
            border-bottom: none;
            font-weight: 600;
            color: #495057;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 16px;
            border: 1px solid #dee2e6;
            border-radius: 0 0 8px 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        #output {
            background-color: #f8f9fa;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .option label {
            cursor: pointer;
            user-select: none;
            color: #495057;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .stats {
            text-align: center;
            padding: 16px;
            background: #e7f3ff;
            border-radius: 8px;
            font-size: 18px;
            color: #004085;
            font-weight: 600;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stats.success {
            background: #d4edda;
            color: #155724;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .options {
                flex-direction: column;
                gap: 12px;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        .icon {
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Deduplicate</h1>
        <p class="subtitle">Remove duplicate items from your lists instantly</p>

        <div class="grid">
            <div class="panel">
                <div class="panel-header">📝 Input (paste your list here)</div>
                <textarea id="input" placeholder="Paste your list here...&#10;One item per line&#10;&#10;Example:&#10;apple&#10;banana&#10;apple&#10;cherry"></textarea>
            </div>

            <div class="panel">
                <div class="panel-header">✅ Output (unique items)</div>
                <textarea id="output" readonly placeholder="Results will appear here..."></textarea>
            </div>
        </div>

        <div class="controls">
            <div class="options">
                <div class="option">
                    <input type="checkbox" id="ignoreCase">
                    <label for="ignoreCase">Ignore case (treat "Apple" = "apple")</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="preserveOrder" checked>
                    <label for="preserveOrder">Preserve original order</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="removeEmpty" checked>
                    <label for="removeEmpty">Remove empty lines</label>
                </div>
                <div class="option">
                    <input type="checkbox" id="trim" checked>
                    <label for="trim">Trim whitespace</label>
                </div>
            </div>

            <div class="buttons">
                <button class="btn-primary" onclick="deduplicate()">
                    <span class="icon">🔄</span>
                    Remove Duplicates
                </button>
                <button class="btn-success" onclick="copyToClipboard()">
                    <span class="icon">📋</span>
                    Copy Results
                </button>
                <button class="btn-secondary" onclick="clearAll()">
                    <span class="icon">🗑️</span>
                    Clear All
                </button>
            </div>

            <div id="stats" class="stats">
                Ready! Paste your list above and click "Remove Duplicates"
            </div>
        </div>
    </div>

    <script>
        function deduplicate() {
            const input = document.getElementById('input').value;
            const ignoreCase = document.getElementById('ignoreCase').checked;
            const preserveOrder = document.getElementById('preserveOrder').checked;
            const removeEmpty = document.getElementById('removeEmpty').checked;
            const trim = document.getElementById('trim').checked;

            if (!input.trim()) {
                showStats('⚠️ Please paste some data first!', false);
                return;
            }

            let lines = input.split('\n');
            const originalCount = lines.length;

            // Trim whitespace if requested
            if (trim) {
                lines = lines.map(line => line.trim());
            }

            // Remove empty lines if requested
            if (removeEmpty) {
                lines = lines.filter(line => line.length > 0);
            }

            let uniqueLines;

            if (preserveOrder) {
                // Preserve order using Set
                const seen = new Set();
                uniqueLines = [];

                for (const line of lines) {
                    const key = ignoreCase ? line.toLowerCase() : line;
                    if (!seen.has(key)) {
                        seen.add(key);
                        uniqueLines.push(line);
                    }
                }
            } else {
                // Sort the results
                if (ignoreCase) {
                    const uniqueMap = new Map();
                    for (const line of lines) {
                        const key = line.toLowerCase();
                        if (!uniqueMap.has(key)) {
                            uniqueMap.set(key, line);
                        }
                    }
                    uniqueLines = Array.from(uniqueMap.values()).sort((a, b) =>
                        a.toLowerCase().localeCompare(b.toLowerCase())
                    );
                } else {
                    uniqueLines = [...new Set(lines)].sort();
                }
            }

            // Display results
            document.getElementById('output').value = uniqueLines.join('\n');

            // Show stats
            const duplicatesRemoved = lines.length - uniqueLines.length;
            showStats(
                `✅ Done! ${uniqueLines.length} unique items | ${duplicatesRemoved} duplicates removed`,
                true
            );
        }

        function copyToClipboard() {
            const output = document.getElementById('output');

            if (!output.value.trim()) {
                showStats('⚠️ Nothing to copy! Process your list first.', false);
                return;
            }

            output.select();
            document.execCommand('copy');

            // Try modern API if available
            if (navigator.clipboard) {
                navigator.clipboard.writeText(output.value);
            }

            showStats('📋 Copied to clipboard!', true);

            // Clear selection after a moment
            setTimeout(() => {
                window.getSelection().removeAllRanges();
            }, 100);
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            showStats('Ready! Paste your list above and click "Remove Duplicates"', false);
        }

        function showStats(message, success) {
            const stats = document.getElementById('stats');
            stats.textContent = message;
            stats.className = success ? 'stats success' : 'stats';
        }

        // Allow keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // Ctrl/Cmd + Enter to deduplicate
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                deduplicate();
            }
            // Ctrl/Cmd + Shift + C to copy
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                copyToClipboard();
            }
        });

        // Auto-focus input on load
        window.onload = function() {
            document.getElementById('input').focus();
        };
    </script>
</body>
</html>
